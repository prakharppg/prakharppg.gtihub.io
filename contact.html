<body data-page="contact">

    <!-- Navigation -->
    <div id="site-navbar"></div>

    <!-- Page Header -->
    <header class="page-header text-center">
        <div class="container animate__animated animate__fadeIn">
            <h1 class="display-4 fw-bold text-gold">Contact Us</h1>
            <p class="lead">Get in touch with us for partnerships</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="row">
                <!-- Contact Info -->
                <div class="col-lg-5 mb-5 mb-lg-0" data-aos="fade-right">
                    <h3>Contact Information</h3>
                    <p class="text-muted mb-5">Reach out to us for brand collaborations, events, or inquiries.</p>

                    <div id="contact-info-details"></div>
                </div>

                <!-- Registration Form -->
                <!-- Registration Form Section -->
                <div class="col-lg-7" data-aos="fade-left">
                    <div class="card border-0 shadow-lg">
                        <div class="card-body p-5">

                            <!-- Tab Navigation -->
                            <ul class="nav nav-pills nav-pills-modern justify-content-center mb-4" id="contactTab"
                                role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="brand-tab" data-bs-toggle="pill"
                                        data-bs-target="#brand-form" type="button" role="tab" aria-controls="brand-form"
                                        aria-selected="true">General / Brand Inquiry</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="artist-tab" data-bs-toggle="pill"
                                        data-bs-target="#artist-form" type="button" role="tab"
                                        aria-controls="artist-form" aria-selected="false">Job / Artist
                                        Registration</button>
                                </li>
                            </ul>

                            <div class="tab-content" id="contactTabContent">
                                <!-- Brand Form (Existing) -->
                                <div class="tab-pane fade show active" id="brand-form" role="tabpanel"
                                    aria-labelledby="brand-tab">
                                    <h3 class="mb-4 text-center">Brand Registration Form</h3>
                                    <form id="brandInquiryForm" novalidate>
                                        <input type="text" name="company_website" class="hp-field" tabindex="-1" autocomplete="off"
                                            aria-hidden="true">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="brand-full-name">Company / Your Name</label>
                                                <input id="brand-full-name" name="full_name" type="text" class="form-control"
                                                    placeholder="Enter name" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="brand-mobile">Mobile Number</label>
                                                <input id="brand-mobile" name="mobile" type="tel" class="form-control"
                                                    placeholder="Enter mobile no." required>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label fw-bold" for="brand-email">Email Address</label>
                                            <input id="brand-email" name="email" type="email" class="form-control"
                                                placeholder="name@example.com" required>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label fw-bold" for="brand-address">Address</label>
                                            <textarea id="brand-address" name="address" class="form-control" rows="2"
                                                placeholder="Start typing address..."></textarea>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="brand-product-type">Product Type</label>
                                                <input id="brand-product-type" name="product_type" type="text" class="form-control"
                                                    placeholder="e.g. Cosmetics, App, Tech">
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="brand-budget-range">Budget Criteria</label>
                                                <select id="brand-budget-range" name="budget_range" class="form-select">
                                                    <option value="">Select Budget Range</option>
                                                    <option value="low">₹1 Lakh - ₹5 Lakh</option>
                                                    <option value="mid">₹5 Lakh - ₹20 Lakh</option>
                                                    <option value="high">₹20 Lakh - ₹50 Lakh</option>
                                                    <option value="premium">₹50 Lakh +</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label fw-bold" for="brand-service-required">Service Required</label>
                                            <select id="brand-service-required" name="service_required" class="form-select" required>
                                                <option value="" selected disabled>Choose a service...</option>
                                                <option value="influencer">Influencer Marketing</option>
                                                <option value="production">Content Production</option>
                                                <option value="celebrity">Celebrity Presence</option>
                                                <option value="digital">Digital & Tech Services</option>
                                                <option value="advertising">Media Advertising</option>
                                                <option value="pr">PR Services</option>
                                            </select>
                                        </div>

                                        <div class="form-status" data-form-status hidden aria-live="polite"></div>

                                        <div class="d-grid mt-4">
                                            <button type="submit" class="btn btn-primary btn-lg">Submit Request</button>
                                        </div>
                                    </form>
                                </div>

                                <!-- Artist Registration Form (New) -->
                                <div class="tab-pane fade" id="artist-form" role="tabpanel"
                                    aria-labelledby="artist-tab">
                                    <h3 class="mb-4 text-center">Artist Registration</h3>
                                    <form id="artistRegistrationForm" novalidate>
                                        <input type="text" name="company_website" class="hp-field" tabindex="-1" autocomplete="off"
                                            aria-hidden="true">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="artist-full-name">Full Name</label>
                                                <input id="artist-full-name" name="full_name" type="text" class="form-control"
                                                    placeholder="Enter full name" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="artist-profession">Profession</label>
                                                <select id="artist-profession" name="profession" class="form-select" required>
                                                    <option value="" selected disabled>Select Profession</option>
                                                    <option value="actor">Actor</option>
                                                    <option value="actress">Actress</option>
                                                    <option value="influencer">Influencer</option>
                                                    <option value="model">Model</option>
                                                    <option value="content_creator">Content Creator</option>
                                                    <option value="other">Other</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="artist-mobile">Mobile Number</label>
                                                <input id="artist-mobile" name="mobile" type="tel" class="form-control"
                                                    placeholder="Enter mobile no." required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="artist-email">Email Address</label>
                                                <input id="artist-email" name="email" type="email" class="form-control"
                                                    placeholder="name@example.com" required>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label fw-bold" for="artist-city">City</label>
                                            <input id="artist-city" name="city" type="text" class="form-control" placeholder="Current City" required>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label fw-bold" for="artist-instagram">Social Media Links</label>
                                            <input id="artist-instagram" name="instagram_url" type="url" class="form-control mb-2" placeholder="Instagram Link">
                                            <input name="youtube_url" type="url" class="form-control mb-2" placeholder="YouTube Link">
                                            <input name="facebook_url" type="url" class="form-control" placeholder="Facebook Link">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label fw-bold" for="artist-portfolio">Work Link / Portfolio</label>
                                            <input id="artist-portfolio" name="portfolio_url" type="url" class="form-control"
                                                placeholder="Google Drive / Website Link">
                                        </div>

                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="artist-photo">Your Photo</label>
                                                <input id="artist-photo" name="photo" type="file" class="form-control" accept="image/*" required>
                                                <small class="text-muted d-block mt-2">Photo will be uploaded to Supabase storage.</small>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label fw-bold" for="artist-expected-price">Expected Price (Per Project)</label>
                                                <input id="artist-expected-price" name="expected_price" type="text" class="form-control" placeholder="e.g. ₹10k - ₹20k">
                                            </div>
                                        </div>

                                        <div class="form-status" data-form-status hidden aria-live="polite"></div>

                                        <div class="d-grid mt-4">
                                            <button type="submit" class="btn btn-primary btn-lg">Register as Artist</button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
